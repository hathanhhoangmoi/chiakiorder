services:
  - type: web
    name: chiaki-dashboard
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: chiaki-db
          property: connectionString

databases:
  - name: chiaki-db
    databaseName: chiaki
    user: chiaki
